// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.0'
        classpath 'com.github.triplet.gradle:play-publisher:3.8.1'
    }
}

allprojects {
    repositories {
        mavenCentral()
        google()
    }
}
